  <style>
    * {

      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Arial Black', Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    .container {
      width: 100%;
      height: 100vh;
      aspect-ratio: 21 / 9;
      max-width: 100vw;
      margin: 0 auto;
      position: relative;
      background: #111;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Placeholder gambar di AWAL (atas sekali) */
    .image-placeholder {

      background: #222 url('https://via.placeholder.com/1920x1080/000/fff?text=LET+AK+GAMBAR+PORN+DI+SINI') 
                  center/cover no-repeat;
      position: relative;
      z-index: 1;
    }

    .image-placeholder img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Background utama (kalau nak layer bawah teks) */
    .bg-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.5) contrast(1.2) saturate(1.5);
      z-index: 0;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 60%, #000 100%);
      z-index: 2;
    }

    .content {
      flex: 1;
      position: relative;
      z-index: 3;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 4vw 6vw;
      text-align: center;
      text-shadow: 
        0 0 12px #ff00aa,
        0 0 24px #ff00aa,
        0 0 48px #ff1493,
        4px 4px 0 #000,
       -4px -4px 0 #000;
    }

    .main-title {
      font-size: clamp(6rem, 14vw, 20rem);
      font-weight: 900;
      color: #ff00aa;
      line-height: 0.85;
      letter-spacing: -0.03em;
      margin-bottom: 0.15em;
      animation: glow 2.8s ease-in-out infinite alternate;
    }

    .subtitle {
      font-size: clamp(2.8rem, 6vw, 9rem);
      color: #ff69b4;
      font-weight: bold;
      margin: 0.3em 0 0.6em;
    }

    .small-repeats {
      font-size: clamp(1.6rem, 4vw, 5rem);
      color: #ff1493;
      opacity: 0.92;
      line-height: 1.5;
      max-width: 95%;
    }

    .bottom-shout {
      position: absolute;
      bottom: 6%;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(4rem, 9vw, 14rem);
      color: #ff0066;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      animation: pulse 1.6s infinite;
    }

    @keyframes glow {
      from { text-shadow: 0 0 12px #ff00aa, 0 0 24px #ff00aa, 0 0 48px #ff1493; }
      to   { text-shadow: 0 0 24px #ff00aa, 0 0 48px #ff1493, 0 0 90px #ff0066; }
    }

    @keyframes pulse {
      0%, 100% { transform: translateX(-50%) scale(1); }
      50%      { transform: translateX(-50%) scale(1.04); }
    }

    @media (min-aspect-ratio: 21/9) {
      .container { height: auto; width: 100vw; }
    }
  </style>
