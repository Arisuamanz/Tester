<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Video Grid Merger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background-color: #000; overflow: hidden; font-family: sans-serif; }
        .video-hidden { display: none; }
        /* Smooth transitions for buttons */
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col h-screen w-screen text-white">

    <!-- Hidden Videos for Processing -->
    <video id="vid1" class="video-hidden" playsinline muted loop></video>
    <video id="vid2" class="video-hidden" playsinline muted loop></video>
    <video id="vid3" class="video-hidden" playsinline muted loop></video>
    <video id="vid4" class="video-hidden" playsinline muted loop></video>

    <!-- Full Screen Canvas Preview -->
    <div class="flex-1 w-full relative flex items-center justify-center bg-black overflow-hidden">
        <!-- Canvas output resolution set to vertical 1080x1920 -->
        <canvas id="outputCanvas" width="1080" height="1920" class="max-w-full max-h-full object-contain"></canvas>
        
        <!-- Recording Indicator -->
        <div id="statusBadge" class="absolute top-6 right-4 bg-red-600 text-white text-xs font-bold px-3 py-1.5 rounded-full hidden animate-pulse shadow-lg flex items-center gap-2 z-20">
            <div class="w-2 h-2 bg-white rounded-full"></div>
            REC
        </div>
    </div>

    <!-- Bottom Controls Panel (Thumb accessible) -->
    <div class="w-full bg-gray-900 pb-8 pt-4 px-4 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.5)] z-10 flex flex-col gap-3">
        
        <h2 class="text-center text-sm font-semibold text-gray-400 mb-1">Upload 4 Videos (Grid 2x2)</h2>
        
        <!-- Upload Buttons Grid -->
        <div class="grid grid-cols-4 gap-2">
            <label id="lbl1" class="btn-active bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer transition">
                <span class="text-xs font-bold text-gray-300">Top L</span>
                <span id="ind1" class="w-2 h-2 rounded-full bg-gray-600 mt-1"></span>
                <input type="file" id="upload1" accept="video/*" class="hidden">
            </label>
            <label id="lbl2" class="btn-active bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer transition">
                <span class="text-xs font-bold text-gray-300">Top R</span>
                <span id="ind2" class="w-2 h-2 rounded-full bg-gray-600 mt-1"></span>
                <input type="file" id="upload2" accept="video/*" class="hidden">
            </label>
            <label id="lbl3" class="btn-active bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer transition">
                <span class="text-xs font-bold text-gray-300">Bot L</span>
                <span id="ind3" class="w-2 h-2 rounded-full bg-gray-600 mt-1"></span>
                <input type="file" id="upload3" accept="video/*" class="hidden">
            </label>
            <label id="lbl4" class="btn-active bg-gray-800 hover:bg-gray-700 border border-gray-700 rounded-xl p-3 flex flex-col items-center justify-center cursor-pointer transition">
                <span class="text-xs font-bold text-gray-300">Bot R</span>
                <span id="ind4" class="w-2 h-2 rounded-full bg-gray-600 mt-1"></span>
                <input type="file" id="upload4" accept="video/*" class="hidden">
            </label>
        </div>

        <!-- Action Buttons -->
        <div class="flex gap-2 mt-2">
            <button id="startBtn" class="btn-active flex-1 bg-green-500 hover:bg-green-600 text-white font-bold text-lg py-4 px-4 rounded-2xl shadow-lg transition">
                Start Record
            </button>
            <button id="stopBtn" class="btn-active flex-1 bg-red-500 hover:bg-red-600 text-white font-bold text-lg py-4 px-4 rounded-2xl shadow-lg transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                Stop & Save
            </button>
        </div>

        <!-- Download Section -->
        <div id="downloadContainer" class="hidden flex-col items-center mt-2">
            <a id="downloadLink" class="btn-active w-full text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-2xl shadow-lg transition">
                Download Video
            </a>
        </div>
    </div>

    <script>
        const inputs = [
            document.getElementById('upload1'),
            document.getElementById('upload2'),
            document.getElementById('upload3'),
            document.getElementById('upload4')
        ];
        
        const indicators = [
            document.getElementById('ind1'),
            document.getElementById('ind2'),
            document.getElementById('ind3'),
            document.getElementById('ind4')
        ];

        const videos = [
            document.getElementById('vid1'),
            document.getElementById('vid2'),
            document.getElementById('vid3'),
            document.getElementById('vid4')
        ];

        const canvas = document.getElementById('outputCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const statusBadge = document.getElementById('statusBadge');
        const downloadContainer = document.getElementById('downloadContainer');
        const downloadLink = document.getElementById('downloadLink');

        let mediaRecorder;
        let recordedChunks = [];
        let animationId;
        let isRecording = false;

        // Init Canvas background
        ctx.fillStyle = "#111";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Handle File Uploads & Indicators
        inputs.forEach((input, index) => {
            input.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const url = URL.createObjectURL(file);
                    videos[index].src = url;
                    videos[index].load();
                    // Change indicator color to green when loaded
                    indicators[index].classList.remove('bg-gray-600');
                    indicators[index].classList.add('bg-green-400', 'shadow-[0_0_8px_#4ade80]');
                }
            });
        });

        // Function to draw video mimicking "object-fit: cover" so it doesn't stretch
        function drawVideoCover(ctx, video, x, y, w, h) {
            if (video.readyState < 2) {
                // Draw placeholder if empty
                ctx.fillStyle = "#222";
                ctx.fillRect(x, y, w, h);
                return;
            }

            const vidW = video.videoWidth;
            const vidH = video.videoHeight;
            const aspectVid = vidW / vidH;
            const aspectBox = w / h;

            let drawW, drawH, drawX, drawY;

            if (aspectVid > aspectBox) {
                // Video is wider
                drawH = h;
                drawW = h * aspectVid;
                drawX = x - (drawW - w) / 2;
                drawY = y;
            } else {
                // Video is taller
                drawW = w;
                drawH = w / aspectVid;
                drawX = x;
                drawY = y - (drawH - h) / 2;
            }

            ctx.save();
            ctx.beginPath();
            ctx.rect(x, y, w, h);
            ctx.clip();
            ctx.drawImage(video, drawX, drawY, drawW, drawH);
            
            // Add slight inner border for grid separation
            ctx.lineWidth = 4;
            ctx.strokeStyle = "#000";
            ctx.stroke();
            
            ctx.restore();
        }

        function drawFrame() {
            if (!isRecording) return;

            const w = canvas.width / 2;
            const h = canvas.height / 2;

            // Clear Background
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw 4 Quadrants
            drawVideoCover(ctx, videos[0], 0, 0, w, h);     // Top Left
            drawVideoCover(ctx, videos[1], w, 0, w, h);     // Top Right
            drawVideoCover(ctx, videos[2], 0, h, w, h);     // Bottom Left
            drawVideoCover(ctx, videos[3], w, h, w, h);     // Bottom Right

            animationId = requestAnimationFrame(drawFrame);
        }

        startBtn.addEventListener('click', async () => {
            recordedChunks = [];
            downloadContainer.classList.add('hidden');
            
            // Play all ready videos
            const playPromises = videos.map(vid => {
                if (vid.src) {
                    vid.currentTime = 0;
                    return vid.play().catch(e => console.log("Play interrupted"));
                }
                return Promise.resolve();
            });

            await Promise.all(playPromises);

            // Capture stream at 30 FPS
            const stream = canvas.captureStream(30);
            
            try {
                let options = { mimeType: 'video/webm; codecs=vp9' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/webm' }; 
                }
                
                mediaRecorder = new MediaRecorder(stream, options);

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    downloadLink.href = url;
                    downloadLink.download = `Grid_Video_${Date.now()}.webm`;
                    downloadContainer.classList.remove('hidden');
                    downloadContainer.classList.add('flex');
                };

                mediaRecorder.start(100); 
                isRecording = true;
                drawFrame();

                startBtn.disabled = true;
                startBtn.classList.add('opacity-50');
                stopBtn.disabled = false;
                statusBadge.classList.remove('hidden');

            } catch (err) {
                alert("Recording failed. Please try another browser.");
                console.error(err);
            }
        });

        stopBtn.addEventListener('click', () => {
            isRecording = false;
            cancelAnimationFrame(animationId);
            
            videos.forEach(vid => {
                if (vid.src) vid.pause();
            });

            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }

            startBtn.disabled = false;
            startBtn.classList.remove('opacity-50');
            stopBtn.disabled = true;
            statusBadge.classList.add('hidden');
        });

    </script>
</body>
</html>
